name: Deploy to Vercel Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: none
  statuses: write
  actions: read
  pull-requests: read
  id-token: none
  security-events: none
  deployments: write

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint --max-warnings 0

  deploy:
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20
    environment:
      name: production
      url: https://maestranza-control-pro.vercel.app
    permissions:
      contents: read
      deployments: write
      id-token: none
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply production database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:deploy

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel --prod --token "$VERCEL_TOKEN" --yes
